<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>User Dashboard</title>
</head>
<body>

    <style>
        :root {
            --primary: #0d6efd;
            --danger: #dc3545;
            --gray: #6c757d;
            --light: #f8f9fa;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            line-height: 1.6;
            margin: 0;
            background-color: #f4f7f6;
            color: #333;
        }

        /* Container */
        .container {
            max-width: 800px;
            margin: 80px auto;
            padding: 0 20px;
        }

        /* Navbar */
        .navbar {
            background: #212529;
            color: white;
            padding: 1rem;
            position: fixed;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 4px rgba(0,0,0,.1);
        }

        /* Cards */
        .card {
            background: white;
            border-radius: 8px;
            padding: 2rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border: 1px solid #dee2e6;
        }

        /* Buttons */
        .btn {
            padding: 0.5rem 1rem;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            font-weight: 500;
            transition: opacity 0.2s;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-outline {
            border: 1px solid var(--gray);
            background: transparent;
        }

        .btn:hover {
            opacity: 0.8;
        }

        /* Status Indicators */
        .badge {
            padding: 0.25rem 0.5rem;
            border-radius: 12px;
            font-size: 0.8rem;
        }

        .bg-success {
            background: #d1e7dd;
            color: #0f5132;
        }

        .bg-warning {
            background: #fff3cd;
            color: #664d03;
        }
    </style>

<a href="users.vividsol.in">Login</a> 

</body>
</html>
